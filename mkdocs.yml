site_name: workledger
site_url: https://couscous18.github.io/workledger/
site_description: Agent work ledger for AI systems
repo_url: https://github.com/couscous18/workledger
repo_name: couscous18/workledger
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Open Traces: open-traces.md
  - Trace To Work: trace-to-work.md
  - Public Traces Demo: public-traces-demo.md
  - Getting Started: getting-started.md
  - Builder Demo: builder-demo.md
  - Installation: installation.md
  - How It Works: how-it-works.md
  - CLI Reference: cli.md
  - Data Model: data-model.md
  - Adapters & Integrations: adapters.md
  - Policy Packs: policy-packs.md
  - Framework Examples: framework-examples.md
  - Reporting: reporting.md
  - Comparative Economics: comparative-economics.md
  - Software CapEx Review: software-capex.md
  - Deployment: deployment.md
  - Schema Specification: schema-spec.md
  - Contributing Policies: contributing-policies.md
  - Release Notes (0.1.0): releases/v0.1.0.md
  - FAQ: faq.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/couscous18/workledger
