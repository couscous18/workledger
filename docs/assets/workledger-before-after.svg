  <circle cx="186" cy="295" r="8" fill="#D97706"/>
  <text x="206" y="300" fill="#21313B" font-size="18" font-family="Arial, sans-serif">Resolve incident ticket BUG-142</text>
  <text x="420" y="300" fill="#7B8793" font-size="14" font-family="Arial, sans-serif">6 spans</text>

  <rect x="156" y="336" width="348" height="54" rx="16" fill="#FFFFFF" stroke="#E6DCCB"/>
  <circle cx="186" cy="363" r="8" fill="#0F766E"/>
  <text x="206" y="368" fill="#21313B" font-size="18" font-family="Arial, sans-serif">Build workflow orchestration dashboard</text>
  <text x="420" y="368" fill="#7B8793" font-size="14" font-family="Arial, sans-serif">5 spans</text>

  <rect x="156" y="404" width="348" height="54" rx="16" fill="#FFFFFF" stroke="#E6DCCB"/>
  <circle cx="186" cy="431" r="8" fill="#2563EB"/>
  <text x="206" y="436" fill="#21313B" font-size="18" font-family="Arial, sans-serif">Automate release checklist workflow</text>
  <text x="420" y="436" fill="#7B8793" font-size="14" font-family="Arial, sans-serif">3 spans</text>

  <text x="156" y="494" fill="#7B8793" font-size="16" font-family="Arial, sans-serif">Span-level tools tell you token counts, latency, and failures.</text>
  <text x="156" y="520" fill="#7B8793" font-size="16" font-family="Arial, sans-serif">They do not tell you which work was maintenance, product, or review-worthy.</text>

  <path d="M565 380H635" stroke="#0F766E" stroke-width="8" stroke-linecap="round"/>
  <path d="M615 356L642 380L615 404" stroke="#0F766E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="696" y="176" fill="#0F766E" font-size="18" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1">WORK UNITS + CLASSIFICATIONS</text>
