  <text x="120" y="72" fill="#10212B" font-size="20" font-family="Georgia, serif" letter-spacing="2">WORKLEDGER BUILDER VIEW</text>
  <text x="120" y="108" fill="#10212B" font-size="42" font-family="Georgia, serif" font-weight="700">14 noisy spans in, 3 reviewable work units out.</text>
  <text x="120" y="142" fill="#51616F" font-size="20" font-family="Georgia, serif">Observability shows the run. workledger shows the work.</text>

  <text x="156" y="176" fill="#7A5C2D" font-size="18" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1">RAW TRACE SPANS</text>
  <text x="156" y="206" fill="#21313B" font-size="32" font-family="Georgia, serif" font-weight="700">14 spans</text>
  <text x="156" y="232" fill="#6A7783" font-size="16" font-family="Arial, sans-serif">retrievers, tools, LLM calls, review steps, guardrails</text>

