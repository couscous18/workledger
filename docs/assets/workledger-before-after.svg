  <text x="731" y="567" fill="#9D174D" font-size="12" font-family="Arial, sans-serif" font-weight="700">PENDING REVIEW</text>

  <rect x="120" y="668" width="960" height="56" rx="18" fill="#10212B"/>
  <text x="154" y="702" fill="#F8FBFA" font-size="20" font-family="Georgia, serif">The point is not more telemetry. The point is a smaller, more useful unit of truth.</text>
